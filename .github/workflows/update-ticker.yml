name: Automate Match Ticker Update

on:
  schedule:
    - cron: '*/30 * * * *' # Cada 30 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-ticker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Update Script
        run: python update_ticker.py --once
        env:
          ONCE_ONLY: true

      - name: Send Telegram Notification
        run: python telegram_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "SportFlow Bot"
          git config --global user.email "bot@sportflow.ai"
          git add ticker_partidos.txt
          git commit -m "Auto-Update: Match Ticker Data [skip ci]" || echo "No changes to commit"
          git push
