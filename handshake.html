<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Túnel Seguro | SportFlow AI</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body.handshake-body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; margin: 0; }
        .handshake-wrapper { width: 90%; max-width: 500px; padding: 30px; background: rgba(10, 10, 10, 0.8); border: 1px solid #333; border-radius: 20px; backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0, 210, 255, 0.1); }
        .handshake-icon { font-size: 3.5rem; color: #00d2ff; margin-bottom: 20px; text-shadow: 0 0 20px #00d2ff; }
        .handshake-title { font-weight: 800; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .handshake-desc { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        .handshake-loader { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 20px; position: relative; }
        .handshake-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.3s; }
        .handshake-logs { height: 120px; background: #050505; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 0.8rem; color: #00ff41; overflow-y: auto; text-align: left; }
        .log-line { margin-bottom: 5px; opacity: 0.8; }
        .pulse-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="handshake-body">
    <div class="handshake-wrapper">
        <div class="matrix-container" style="text-align: center;">
            <div class="handshake-icon">
                <i class="fas fa-microchip pulse-glow"></i>
            </div>
            <h2 class="handshake-title">SPORTFLOW SECURE AI GATE</h2>
            <p class="handshake-desc">Verificando conexión desde red social para acceso Premium HD...</p>
            
            <div class="handshake-loader">
                <div id="handshake-progress" class="handshake-bar"></div>
            </div>
            
            <div id="handshake-logs" class="handshake-logs">
                <div class="log-line">> Sincronizando IP Social [OK]</div>
                <div class="log-line">> Bypass Antispam activo...</div>
            </div>
            
            <!-- Strategic Monetization Section -->
            <div id="ad-gate" style="margin-top: 25px; min-height: 50px; background: rgba(255,255,255,0.02); border-radius: 10px; padding: 10px;">
                <p style="font-size: 0.6rem; color: #444; margin-bottom: 10px;">PUBLICIDAD DE SEGURIDAD</p>
                <div id="ad-container-gate"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progress = document.getElementById('handshake-progress');
            const logs = document.getElementById('handshake-logs');
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('id');
            const isSocial = urlParams.get('ref') === 'social';

            const logMessages = [
                "> Ofuscando origen de datos...",
                "> Validando token de sesión temporal...",
                "> Preparando buffer de video encriptado...",
                "> Verificación de seguridad completa.",
                "> Redirigiendo a Zona de Transmisión..."
            ];

            let p = 0;
            let logIndex = 0;
            const interval = setInterval(() => {
                p += Math.random() * 8;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        window.location.href = matchId ? `/match-preview.html?id=${matchId}` : '/';
                    }, 500);
                }
                progress.style.width = p + '%';
                
                if (Math.random() > 0.7 && logIndex < logMessages.length) {
                    const div = document.createElement('div');
                    div.className = 'log-line';
                    div.textContent = logMessages[logIndex++];
                    logs.appendChild(div);
                    logs.scrollTop = logs.scrollHeight;
                }
            }, 300);

            // Inyección de anuncio (Richard's Key)
            if (typeof renderAd === 'function') {
                renderAd('ad-container-gate', '0d6323163d0bf049f77d24605b7baf54', 320, 50);
            }
        });
    </script>
</body>
</html>
