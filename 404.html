<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizando Túnel Seguro | SportFlow AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #09f; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="spinner" style="margin: 0 auto 20px;"></div>
        <p>IDENTIFICANDO ENCUENTRO...</p>
        <p style="font-size: 0.7rem; color: #444;">Bypass Vercel Logic v5.29</p>
    </div>

    <script>
        const path = window.location.pathname.toLowerCase();
        const parts = path.split('/');
        
        // v5.29: Bulletproof Redirect Logic for Richard's Viral Links
        if (path.includes('/partido/')) {
            const pIdx = parts.indexOf('partido');
            const id = parts[pIdx + 1];
            const slug = parts[pIdx + 2] || '';
            window.location.href = `/match-preview.html?id=${id}&slug=${slug}&viral=true`;
        } else if (path.includes('/equipos/') || path.includes('/ligas/')) {
            const id = parts[parts.length - 1];
            window.location.href = `/sports-hub.html?id=${id}`;
        } else {
            // Real 404 -> Go Home
            window.location.href = '/';
        }
    </script>
</body>
</html>
